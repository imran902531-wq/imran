<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Login Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    width:360px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

h1{
    color:#2563eb;
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.links{
    text-align:center;
    margin-top:15px;
}

.links a{
    text-decoration:none;
    color:#2563eb;
}

hr{
    margin:20px 0;
}

.create{
    background:#22c55e;
}

.create:hover{
    background:#16a34a;
}
</style>

</head>
<body>

<div class="container">

<h1>Social Login Demo</h1>

<form>
    <input type="text" placeholder="Email or Username" required>
    <input type="password" placeholder="Password" required>
    <button type="submit">Log In</button>
</form>

<div class="links">
    <a href="#">Forgot Password?</a>
</div>

<hr>

<button class="create">Create New Account</button>

</div>

</body>
</html>
